<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christopher Di | Trainer Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#E6E6E6] font-['Inter'] min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-2xl bg-[#222224] border-4 border-black rounded-lg p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,0.15)] relative overflow-hidden">
        
        <div class="h-2 w-full bg-[#E53935] absolute top-0 left-0"></div>

        <div class="flex justify-between items-center mb-6 pt-2">
            <h1 class="font-['Press_Start_2P'] text-xs text-white tracking-wider">TRAINER CARD</h1>
            <span class="font-['Press_Start_2P'] text-[10px] text-[#FDD835]">ID No. 2026</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-[#303032] border-2 border-black p-4 rounded text-white">
            
            <div class="space-y-4 font-['Press_Start_2P'] text-[11px] leading-relaxed">
                <p class="text-[#FDD835]">NAME:</p>
                <p class="pl-4 text-white">Christopher Di</p>
                
                <p class="text-[#FDD835] pt-2">CLASS:</p>
                <p class="pl-4 text-white">Data Scientist</p>
                
                <p class="text-[#FDD835] pt-2">MONEY:</p>
                <p class="pl-4 text-emerald-400">$$$999,999</p>
            </div>

            <div class="border-2 border-dashed border-gray-500 rounded flex flex-col items-center justify-center p-4 bg-[#222224]">
                <div class="text-3xl mb-2">🧍‍♂️</div>
                <p class="text-xs text-gray-400 font-mono text-center">[ Your Sprite / Photo Here ]</p>
            </div>
        </div>

        <div class="mt-6 border-2 border-black bg-[#E6E6E6] p-3 rounded flex justify-around items-center">
            <div class="w-10 h-10 bg-amber-500 rounded-full flex items-center justify-center shadow-inner cursor-pointer hover:scale-110 transition-transform" title="AWS Cert">🛡️</div>
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center shadow-inner cursor-pointer hover:scale-110 transition-transform" title="Security Cert">⚡</div>
            <div class="w-10 h-10 bg-rose-500 rounded-full flex items-center justify-center shadow-inner cursor-pointer hover:scale-110 transition-transform" title="Python Mastery">🔥</div>
        </div>

    </div>

</body>
</html>
